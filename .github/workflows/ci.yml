name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Format check (Spotless / Google Java Format)
        run: ./gradlew spotlessCheck

      - name: Lint (Checkstyle & SpotBugs)
        run: ./gradlew checkstyleMain checkstyleTest spotbugsMain spotbugsTest

      - name: Test
        run: ./gradlew test
